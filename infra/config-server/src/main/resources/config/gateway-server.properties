server.port=8080

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=event-service
spring.cloud.gateway.routes[0].uri=lb://event-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/events/**,/admin/events/**,/users/*/events/**,/users/*/requests/**,/admin/users/**,/categories/**,/admin/categories/**,/compilations/**,/admin/compilations/**
