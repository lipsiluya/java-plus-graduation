server.port=8080

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=event-service
spring.cloud.gateway.routes[0].uri=lb://event-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/events/**,/admin/events/**,/users/*/events/**

spring.cloud.gateway.routes[1].id=request-service
spring.cloud.gateway.routes[1].uri=lb://request-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/*/requests/**

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[3].id=extra-service
spring.cloud.gateway.routes[3].uri=lb://extra-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/categories/**,/admin/categories/**,/compilations/**,/admin/compilations/**
