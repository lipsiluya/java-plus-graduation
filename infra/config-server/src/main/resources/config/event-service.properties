server.port=0

spring.datasource.url=jdbc:postgresql://main-db:5432/main
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=main
spring.datasource.password=main
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

stat.server.id=stats-server

grpc.client.collector.address=discovery:///collector
grpc.client.collector.enableKeepAlive=true
grpc.client.collector.keepAliveWithoutCalls=true
grpc.client.collector.negotiationType=plaintext

grpc.client.analyzer.address=discovery:///analyzer
grpc.client.analyzer.enableKeepAlive=true
grpc.client.analyzer.keepAliveWithoutCalls=true
grpc.client.analyzer.negotiationType=plaintext

